# What is the goal of your workflow
# Goal: Whenever someone changes the python code
# The Linter will check if the syntax, indentation, formal (Linting) is correct or not
name: Auto Linter Python

on:
  push:
   paths: "*.py"
jobs:
   code:
     runs-on: ubuntu-latest
     steps:
     # This steps will automatically clone the code of the current branch into the runner 
       - name: Checkout/Clone the Code
         uses: actions/checkout@v7
      # This step will install the Python
       - name: Setup Python
         uses: actions/setup-python@v5
         with:
             python-version: '3.14'
     # This step will install the linting tool
       - name: Install Linter
         run: pip install ruff
     # This step will run the linter
       - name: Check the files for linting
         run: ruff check .
     # This step will fix using the Linter
     #  - name: Fix using linter
     #    run: ruff check --fix
        
    
